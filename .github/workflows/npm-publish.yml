name: Publish Package

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-slim
    permissions:
      id-token: write # Required for OIDC
      contents: write # softprops/action-gh-release
      attestations: write # actions/attest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm i
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run test
      - name: Extract Version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
      - run: pnpm publish --no-git-checks
      - name: Rename CLI artifact
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          artifact="dist/${repo}-v${{ env.VERSION }}.js"
          mv dist/cli.js "$artifact"
          echo "CLI_ARTIFACT=$artifact" >> "$GITHUB_ENV"
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ env.CLI_ARTIFACT }}
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ env.CLI_ARTIFACT }}
          tag_name: v${{ env.VERSION }}
